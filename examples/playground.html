<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Superficie – Playground</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/clojure.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f8f9fa; padding: 2rem; max-width: 1200px; margin: 0 auto; }
  h1 { margin-bottom: 0.5rem; }
  .subtitle { color: #666; margin-bottom: 2rem; }

  .example { margin-bottom: 2rem; border: 1px solid #e1e4e8; border-radius: 8px; overflow: hidden; background: #fff; }
  .example-title { padding: 0.75rem 1rem; background: #f6f8fa; border-bottom: 1px solid #e1e4e8; font-weight: 600; font-size: 0.9rem; color: #24292e; }

  /* Tab buttons */
  .tabs { display: flex; border-bottom: 1px solid #e1e4e8; background: #fafbfc; }
  .tab-btn { padding: 0.5rem 1rem; border: none; background: none; cursor: pointer; font-size: 0.85rem; font-weight: 500; color: #586069; border-bottom: 2px solid transparent; margin-bottom: -1px; }
  .tab-btn.active { color: #0366d6; border-bottom-color: #0366d6; background: #fff; }
  .tab-btn:hover:not(.active) { color: #24292e; }

  /* Code panels */
  .panels { position: relative; }
  .panel { display: none; }
  .panel.active { display: block; }
  .panel pre { margin: 0; padding: 1rem; overflow-x: auto; font-size: 0.875rem; line-height: 1.5; }
  .panel code { font-family: "JetBrains Mono", "Fira Code", "SF Mono", Menlo, monospace; }

  /* Side-by-side mode for wide screens */
  @media (min-width: 768px) {
    .mode-sidebyside .tabs { display: none; }
    .mode-sidebyside .panels { display: flex; }
    .mode-sidebyside .panel { display: block !important; flex: 1; min-width: 0; }
    .mode-sidebyside .panel + .panel { border-left: 1px solid #e1e4e8; }
    .mode-sidebyside .panel-label { display: block; padding: 0.25rem 1rem; background: #f6f8fa; border-bottom: 1px solid #e1e4e8; font-size: 0.75rem; font-weight: 600; color: #586069; text-transform: uppercase; letter-spacing: 0.05em; }
  }
  .panel-label { display: none; }

  /* Mode toggle */
  .controls { margin-bottom: 1rem; display: flex; gap: 0.5rem; align-items: center; }
  .controls label { font-size: 0.85rem; color: #586069; }
  .toggle { appearance: none; width: 36px; height: 20px; background: #d1d5da; border-radius: 10px; position: relative; cursor: pointer; transition: background 0.2s; }
  .toggle:checked { background: #0366d6; }
  .toggle::after { content: ''; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; background: #fff; border-radius: 50%; transition: transform 0.2s; }
  .toggle:checked::after { transform: translateX(16px); }

  /* Try it editor */
  .try-section { margin-bottom: 2.5rem; }
  .try-section h2 { margin-bottom: 0.75rem; font-size: 1.1rem; }
  .try-editor { display: flex; gap: 0; border: 1px solid #e1e4e8; border-radius: 8px; overflow: hidden; background: #fff; }
  @media (max-width: 767px) { .try-editor { flex-direction: column; } }
  .try-pane { flex: 1; min-width: 0; display: flex; flex-direction: column; }
  .try-pane + .try-pane { border-left: 1px solid #e1e4e8; }
  @media (max-width: 767px) { .try-pane + .try-pane { border-left: none; border-top: 1px solid #e1e4e8; } }
  .try-pane-label { padding: 0.25rem 1rem; background: #f6f8fa; border-bottom: 1px solid #e1e4e8; font-size: 0.75rem; font-weight: 600; color: #586069; text-transform: uppercase; letter-spacing: 0.05em; display: flex; align-items: center; gap: 0.5rem; }
  .try-pane-label select { font-size: 0.75rem; font-family: inherit; border: 1px solid #d1d5da; border-radius: 4px; padding: 0.1rem 0.3rem; background: #fff; color: #24292e; cursor: pointer; }
  .try-input { width: 100%; min-height: 200px; border: none; outline: none; resize: vertical; padding: 1rem; font-family: "JetBrains Mono", "Fira Code", "SF Mono", Menlo, monospace; font-size: 0.875rem; line-height: 1.5; background: #fff; color: #24292e; tab-size: 2; }
  .try-output { flex: 1; }
  .try-output pre { margin: 0; padding: 1rem; min-height: 200px; font-size: 0.875rem; line-height: 1.5; overflow-x: auto; }
  .try-output code { font-family: "JetBrains Mono", "Fira Code", "SF Mono", Menlo, monospace; }
  .try-error { color: #cb2431; font-style: italic; }
</style>
</head>
<body>

<h1>Superficie</h1>
<p class="subtitle">Surface syntax for Clojure — try it live, explore examples</p>

<div class="try-section">
  <h2>Try it</h2>
  <div class="try-editor">
    <div class="try-pane">
      <div class="try-pane-label">
        Clojure
        <select id="snippet-select">
          <option value="">— load example —</option>
        </select>
      </div>
      <textarea id="try-input" class="try-input" spellcheck="false" placeholder="Type or paste Clojure code here..."></textarea>
    </div>
    <div class="try-pane">
      <div class="try-pane-label">Superficie</div>
      <div class="try-output">
        <pre><code id="try-output" class="language-superficie"></code></pre>
      </div>
    </div>
  </div>
</div>

<div class="repl-section" style="margin-bottom:2.5rem;">
  <h2 style="margin-bottom:0.75rem;font-size:1.1rem;">REPL <span id="repl-status" style="font-size:0.75rem;font-weight:400;color:#586069;">(loading…)</span></h2>
  <div style="display:flex;gap:0;border:1px solid #e1e4e8;border-radius:8px;overflow:hidden;background:#fff;flex-direction:column;">
    <div style="display:flex;gap:0;flex:1;">
      <div style="flex:1;min-width:0;display:flex;flex-direction:column;">
        <div style="padding:0.25rem 1rem;background:#f6f8fa;border-bottom:1px solid #e1e4e8;border-right:1px solid #e1e4e8;font-size:0.75rem;font-weight:600;color:#586069;text-transform:uppercase;letter-spacing:0.05em;display:flex;align-items:center;justify-content:space-between;">
          <span>Superficie input</span>
          <button id="repl-reset" style="font-size:0.75rem;font-family:inherit;border:1px solid #d1d5da;border-radius:4px;padding:0.1rem 0.5rem;background:#fff;color:#586069;cursor:pointer;" title="Clear all definitions">Reset</button>
        </div>
        <textarea id="repl-input" spellcheck="false"
          style="width:100%;min-height:140px;border:none;border-right:1px solid #e1e4e8;outline:none;resize:vertical;padding:1rem;font-family:'JetBrains Mono','Fira Code','SF Mono',Menlo,monospace;font-size:0.875rem;line-height:1.5;background:#fff;color:#24292e;tab-size:2;"
          placeholder="def x: 42&#10;println(x)"></textarea>
        <div style="padding:0.4rem 1rem;border-top:1px solid #e1e4e8;border-right:1px solid #e1e4e8;background:#fafbfc;display:flex;gap:0.5rem;">
          <button id="repl-run" style="padding:0.3rem 0.9rem;background:#0366d6;color:#fff;border:none;border-radius:4px;font-size:0.85rem;font-family:inherit;cursor:pointer;">Run</button>
          <span style="font-size:0.75rem;color:#999;line-height:2;">Ctrl+Enter</span>
        </div>
      </div>
      <div style="flex:1;min-width:0;display:flex;flex-direction:column;">
        <div style="padding:0.25rem 1rem;background:#f6f8fa;border-bottom:1px solid #e1e4e8;font-size:0.75rem;font-weight:600;color:#586069;text-transform:uppercase;letter-spacing:0.05em;">Output</div>
        <div id="repl-output" style="flex:1;padding:1rem;min-height:140px;font-family:'JetBrains Mono','Fira Code','SF Mono',Menlo,monospace;font-size:0.875rem;line-height:1.5;overflow-x:auto;white-space:pre-wrap;color:#24292e;"></div>
      </div>
    </div>
  </div>
</div>

<div class="controls">
  <label for="mode-toggle">Side by side</label>
  <input type="checkbox" id="mode-toggle" class="toggle" checked>
</div>

<div id="examples"></div>

<!-- Superficie: browser bundle (renders Clojure → Superficie live) + highlight.js plugin -->
<script src="https://unpkg.com/superficie@latest/dist/browser/superficie.js"></script>
<script src="https://unpkg.com/superficie@latest/dist/superficie.hljs.js"></script>
<!-- Superficie: SCI REPL bundle (evaluates superficie source) -->
<script src="https://unpkg.com/superficie@latest/dist/browser-repl/superficie-repl.js"></script>
<script>

// Only Clojure source needed — superficie is rendered automatically
const examples = [
  {
    title: "Namespace declaration",
    clojure: `(ns myapp.core
  (:require [clojure.string :as str]
            [clojure.set :refer [union intersection]]))`
  },
  {
    title: "Definitions",
    clojure: `(def pi 3.14159)

(defonce db-conn
  (connect "localhost:5432"))`
  },
  {
    title: "Function definition",
    clojure: `(defn greet [name]
  (str "Hello, " name "!"))`
  },
  {
    title: "Arithmetic with operator precedence",
    clojure: `(defn quadratic [a b c x]
  (+ (* a x x) (* b x) c))`
  },
  {
    title: "Threading (pipes)",
    clojure: `(defn process-users [users]
  (->> users
       (filter :active)
       (map :name)
       (sort)
       (take 10)))`
  },
  {
    title: "Control flow",
    clojure: `(defn classify [x]
  (cond
    (neg? x) :negative
    (zero? x) :zero
    :else :positive))`
  },
  {
    title: "Let flattening and if/else",
    clojure: `(defn safe-divide [a b]
  (if (zero? b)
    {:error "Division by zero"}
    (let [result (/ a b)
          rounded (Math/round result)]
      {:value result :rounded rounded})))`
  },
  {
    title: "Loop/recur",
    clojure: `(defn factorial [n]
  (loop [i n acc 1]
    (if (<= i 1)
      acc
      (recur (dec i) (* acc i)))))`
  },
  {
    title: "Try/catch and Java interop",
    clojure: `(defn parse-int [s]
  (try
    (Integer/parseInt s)
    (catch NumberFormatException e
      (println (str "Invalid: " (.getMessage e)))
      nil)))`
  },
  {
    title: "For comprehension",
    clojure: `(defn pairs [xs ys]
  (for [x xs
        y ys
        :when (not= x y)]
    [x y]))`
  },
  {
    title: "Higher-order functions",
    clojure: `(defn transform-values [m f]
  (->> m
       (map (fn [[k v]] [k (f v)]))
       (into {})))

(transform-values {:a 1 :b 2 :c 3}
                  (fn [x] (* x x)))`
  },
  {
    title: "Macros with syntax-quote",
    clojure: "(defmacro unless [pred & body]\n  `(if (not ~pred)\n     (do ~@body)))"
  },
  {
    title: "Reader forms: deref, quote, var",
    clojure: `(defn swap-and-log [state f]
  (let [old @state
        new (swap! state f)]
    (println (quote swapped) old '-> new)
    #'swap-and-log))`
  },
  {
    title: "defmulti and defmethod",
    clojure: `(defmulti area :shape)

(defmethod area :circle [s]
  (* Math/PI (:radius s) (:radius s)))

(defmethod area :rect [s]
  (* (:width s) (:height s)))

(defmethod area :default [s]
  (throw (ex-info "Unknown shape" {:shape (:shape s)})))`
  },
  {
    title: "defprotocol",
    clojure: `(defprotocol Drawable
  "Something that can be drawn."
  (draw [this ctx])
  (bounding-box [this])
  (translate [this dx dy]))`
  },
  {
    title: "defrecord with protocol implementation",
    clojure: `(defrecord Circle [cx cy r]
  Drawable
  (draw [this ctx]
    (.arc ctx cx cy r 0 (* 2 Math/PI)))
  (bounding-box [this]
    {:x (- cx r) :y (- cy r) :w (* 2 r) :h (* 2 r)})
  (translate [this dx dy]
    (->Circle (+ cx dx) (+ cy dy) r)))`
  },
  {
    title: "reify",
    clojure: `(defn make-counter []
  (let [n (atom 0)]
    (reify
      clojure.lang.IDeref
      (deref [_] @n)
      java.lang.Runnable
      (run [_] (swap! n inc)))))`
  },
  {
    title: "proxy",
    clojure: `(defn make-logging-stream [delegate]
  (proxy [java.io.InputStream] []
    (read []
      (let [b (.read delegate)]
        (println "read byte:" b)
        b))
    (close []
      (println "closing")
      (.close delegate))))`
  },
  {
    title: "Comments",
    clojure: `(defn area [r]
  ;; classic formula
  (* Math/PI r r))`
  },
  {
    title: "Hiccup UI component",
    clojure: `(defn user-table [users]
  [:table.data-table
   [:thead
    [:tr
     [:th "Name"]
     [:th "Email"]
     [:th "Role"]]]
   [:tbody
    (for [{:keys [name email role]} users]
      [:tr
       [:td name]
       [:td [:a {:href (str "mailto:" email)} email]]
       [:td role]])]])`
  },
  {
    title: "Tagged literal inside ordinary data",
    clojure: `(def release
  {:version "0.2.0"
   :published-at #inst "2026-03-11"
   :channel :preview})`
  },
  {
    title: "Reader conditional as exact raw island",
    clojure: `(defn parse-int [s]
  #?(:clj (Integer/parseInt s)
     :cljs (js/parseInt s 10)))

(defn process [data]
  (->> data
       (filter :active)
       (map :name)))`
  },
  {
    title: "Inline comment form in rendered code",
    clojure: `(defn inspect-user [user]
  (comment user)
  (:name user))`
  },
  {
    title: "Syntax-quote preserved literally",
    clojure: "(defmacro emit-pair [a b]\n  `[~a ~b ~@[]])"
  }
];

function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function renderExamples() {
  const container = document.getElementById('examples');
  container.innerHTML = examples.map(ex => {
    // Render superficie from Clojure source
    let sup;
    try {
      sup = superficie.renderString(ex.clojure);
    } catch (e) {
      sup = ';; render error: ' + e.message;
    }

    return `
    <div class="example mode-sidebyside">
      <div class="example-title">${escapeHtml(ex.title)}</div>
      <div class="tabs">
        <button class="tab-btn active" data-lang="clojure">Clojure</button>
        <button class="tab-btn" data-lang="superficie">Superficie</button>
      </div>
      <div class="panels">
        <div class="panel active" data-lang="clojure">
          <div class="panel-label">Clojure</div>
          <pre><code class="language-clojure">${hljs.highlight(ex.clojure, {language: 'clojure'}).value}</code></pre>
        </div>
        <div class="panel" data-lang="superficie">
          <div class="panel-label">Superficie</div>
          <pre><code class="language-superficie">${hljs.highlight(sup, {language: 'superficie'}).value}</code></pre>
        </div>
      </div>
    </div>`;
  }).join('');

  // Tab click handlers
  container.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      const example = e.target.closest('.example');
      example.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      example.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      e.target.classList.add('active');
      example.querySelector(`.panel[data-lang="${e.target.dataset.lang}"]`).classList.add('active');
    });
  });
}

// Mode toggle
document.getElementById('mode-toggle').addEventListener('change', (e) => {
  document.querySelectorAll('.example').forEach(ex => {
    ex.classList.toggle('mode-sidebyside', e.target.checked);
  });
});

renderExamples();

// --- Try-it editor ---
var tryInput = document.getElementById('try-input');
var tryOutput = document.getElementById('try-output');
var snippetSelect = document.getElementById('snippet-select');

// Populate snippet dropdown from examples
examples.forEach(function(ex, i) {
  var opt = document.createElement('option');
  opt.value = i;
  opt.textContent = ex.title;
  snippetSelect.appendChild(opt);
});

function updateOutput() {
  var src = tryInput.value;
  if (!src.trim()) {
    tryOutput.className = 'language-superficie';
    tryOutput.textContent = '';
    return;
  }
  try {
    var result = superficie.renderString(src);
    tryOutput.className = 'language-superficie';
    tryOutput.innerHTML = hljs.highlight(result, {language: 'superficie'}).value;
  } catch (e) {
    tryOutput.className = 'try-error';
    tryOutput.textContent = e.message || 'Render error';
  }
}

tryInput.addEventListener('input', updateOutput);

// Handle tab key in textarea
tryInput.addEventListener('keydown', function(e) {
  if (e.key === 'Tab') {
    e.preventDefault();
    var start = this.selectionStart;
    var end = this.selectionEnd;
    this.value = this.value.substring(0, start) + '  ' + this.value.substring(end);
    this.selectionStart = this.selectionEnd = start + 2;
    updateOutput();
  }
});

snippetSelect.addEventListener('change', function() {
  if (this.value !== '') {
    tryInput.value = examples[this.value].clojure;
    updateOutput();
    this.value = '';
  }
});

// Load first example on page load
tryInput.value = examples[0].clojure;
updateOutput();

// --- SCI REPL ---
var replInput  = document.getElementById('repl-input');
var replOutput = document.getElementById('repl-output');
var replStatus = document.getElementById('repl-status');
var replRun    = document.getElementById('repl-run');
var replReset  = document.getElementById('repl-reset');

function replReady() {
  return typeof superficieRepl !== 'undefined';
}

function setReplStatus() {
  if (replReady()) {
    replStatus.textContent = '(SCI ready)';
    replStatus.style.color = '#28a745';
    replRun.disabled = false;
  } else {
    replStatus.textContent = '(REPL bundle not loaded)';
    replStatus.style.color = '#cb2431';
    replRun.disabled = true;
  }
}

function escapeHtmlRepl(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function runRepl() {
  if (!replReady()) return;
  var src = replInput.value.trim();
  if (!src) return;
  var res = superficieRepl.evalSup(src);
  var html = '';
  if (res.output) html += '<span style="color:#24292e">' + escapeHtmlRepl(res.output) + '</span>';
  if (res.error)  html += '<span style="color:#cb2431">' + escapeHtmlRepl(res.error) + '</span>';
  else            html += '<span style="color:#005cc5">=> ' + escapeHtmlRepl(res.result) + '</span>';
  replOutput.innerHTML += (replOutput.innerHTML ? '\n' : '') + html;
  replOutput.scrollTop = replOutput.scrollHeight;
}

replRun.addEventListener('click', runRepl);

replInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
    e.preventDefault();
    runRepl();
  }
  if (e.key === 'Tab') {
    e.preventDefault();
    var s = this.selectionStart, end = this.selectionEnd;
    this.value = this.value.substring(0, s) + '  ' + this.value.substring(end);
    this.selectionStart = this.selectionEnd = s + 2;
  }
});

replReset.addEventListener('click', function() {
  if (replReady()) { superficieRepl.reset(); }
  replOutput.innerHTML = '';
  replOutput.innerHTML = '<span style="color:#586069;font-style:italic">Context reset.</span>';
});

setReplStatus();
</script>
</body>
</html>
